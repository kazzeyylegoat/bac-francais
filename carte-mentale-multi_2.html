<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Mentale – Révision Bac Français</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0ede8;min-height:100vh;padding:8px 12px;overflow-x:auto}
h1{text-align:center;font-size:20px;color:#1a1a1a;margin-bottom:2px;font-weight:700}
.sub-header{text-align:center;color:#aaa;font-size:11px;margin-bottom:8px}

/* ONGLETS */
.tabs-bar{display:flex;gap:0;margin-bottom:0;justify-content:center;border-bottom:2px solid #ddd;padding:0 12px}
.tab-btn{padding:9px 18px;border:2px solid transparent;border-bottom:none;border-radius:8px 8px 0 0;background:#f0ede8;color:#888;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;margin-bottom:-2px;white-space:nowrap}
.tab-btn:hover:not(.active){background:#e8e5e0;color:#555}
.tab-btn.active{background:white;color:#1a1a1a;border-color:#ddd;border-bottom-color:white}
.tab-work-title{font-size:12px;font-weight:700;display:block}
.tab-work-sub{font-size:10px;font-weight:400;color:#aaa;display:block}
.tab-btn.active .tab-work-sub{color:#888}

.layout{display:grid;grid-template-columns:310px 1fr 310px;gap:12px;align-items:start;min-width:1060px}
.panel{background:white;border-radius:0 12px 12px 12px;box-shadow:0 6px 24px rgba(0,0,0,0.07);overflow:hidden}
.panel:not(.sidebar){border-radius:12px}
.panel-header{padding:10px 14px 8px;border-bottom:1px solid #f0ede8;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:#aaa;font-weight:700}
.panel-body{padding:12px 14px}
.sidebar{position:sticky;top:8px;max-height:calc(100vh - 80px);display:flex;flex-direction:column}
.sidebar .panel-body{overflow-y:auto;flex:1}
.sidebar .panel-body::-webkit-scrollbar{width:4px}
.sidebar .panel-body::-webkit-scrollbar-thumb{background:#d3d1c7;border-radius:4px}

/* DISSERTATION */
.diss-config{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #f0ede8}
.config-row{display:flex;align-items:center;gap:6px}
.config-label{font-size:10px;color:#888;font-weight:600;min-width:80px}
.config-btns{display:flex;gap:3px}
.cfg-btn{padding:3px 9px;border-radius:5px;border:1px solid #ddd;background:white;cursor:pointer;font-size:11px;color:#555;transition:all .15s}
.cfg-btn.active{background:#2c2c2a;color:white;border-color:#2c2c2a}
.cfg-toggle{padding:3px 9px;border-radius:5px;border:1px solid #ddd;background:white;cursor:pointer;font-size:11px;color:#555}
.cfg-toggle.on{background:#27ae60;color:white;border-color:#27ae60}

.diss-pages{overflow:hidden}
.diss-page{display:none;flex-direction:column;gap:8px;max-height:460px;overflow-y:auto;padding-right:4px}
.diss-page.active{display:flex}
.diss-page::-webkit-scrollbar{width:4px}
.diss-page::-webkit-scrollbar-thumb{background:#d3d1c7;border-radius:4px}

.page-nav{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid #f0ede8}
.nav-arrow{width:24px;height:24px;border-radius:50%;border:1px solid #ddd;background:white;cursor:pointer;font-size:12px;color:#555;transition:all .15s;user-select:none}
.nav-arrow:hover:not(:disabled){background:#2c2c2a;color:white;border-color:#2c2c2a}
.nav-arrow:disabled{opacity:0.3;cursor:default}
.page-indicator{font-size:10px;color:#aaa;min-width:46px;text-align:center}

.diss-section{border-radius:8px;border:1px solid #eee;overflow:hidden}
.section-head{display:flex;align-items:center;gap:6px;padding:7px 10px;background:#f8f7f2}
.section-num{font-size:9px;font-weight:700;color:white;background:#2c2c2a;border-radius:3px;padding:2px 5px;white-space:nowrap}
.section-title-input{flex:1;border:none;background:transparent;font-size:12px;font-weight:600;color:#2c2c2a;outline:none;font-family:inherit}
.section-title-input::placeholder{color:#ccc}

.sub-parts{padding:7px;display:flex;flex-direction:column;gap:5px}
.sub-part{border-radius:7px;border:1.5px dashed #e0e0e0;padding:7px 9px;min-height:46px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:3px;position:relative}
.sub-part.drop-target{border-color:#2c2c2a;background:#f8f7f2}
.sub-part.has-idea{border-style:solid;background:white}
.sub-part-label{font-size:9px;color:#ccc;font-weight:700;text-transform:uppercase}
.sub-part-hint{font-size:10px;color:#ccc;text-align:center;padding:4px 0}
.sub-part-title{font-weight:600;font-size:11px;line-height:1.3}
.sub-part-cit{font-style:italic;color:#888;font-size:10px;margin-top:1px}
.remove-idea{position:absolute;top:3px;right:5px;background:none;border:none;color:#ddd;cursor:pointer;font-size:11px;padding:0}
.remove-idea:hover{color:#e74c3c}

.free-section{display:flex;flex-direction:column;gap:5px}
.free-label{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.5px}
.free-textarea{width:100%;padding:7px 9px;border:1px solid #eee;border-radius:7px;font-family:inherit;font-size:11px;resize:vertical;min-height:60px;outline:none;color:#333;background:#fafaf8}
.free-textarea:focus{border-color:#aaa}
.intro-fixed-text{background:#f8f7f2;border-radius:7px;padding:9px 11px;font-size:10.5px;color:#333;line-height:1.65;border-left:3px solid #2c2c2a;max-height:160px;overflow-y:auto}
.intro-fixed-text em{font-style:italic}
.prob-textarea{border-color:#534AB7!important;background:#EEEDFE!important;font-weight:600;color:#534AB7;font-size:12px}
.prob-textarea::placeholder{color:#a09fe0;font-weight:400}

/* DETAILS */
.cat-badge{display:inline-block;padding:3px 11px;border-radius:14px;font-size:11px;font-weight:700;color:white;margin-bottom:7px}
.idea-title-sb{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:10px;line-height:1.4}
.sec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:700;color:#aaa;margin-top:10px;margin-bottom:4px}
.dev-box{background:#f8f8f8;border-radius:7px;padding:8px 10px;font-size:11.5px;color:#333;line-height:1.6;font-style:italic}
.cit-item{background:#f8f8f8;border-radius:6px;padding:6px 8px;font-size:11px;color:#444;line-height:1.5;margin-bottom:4px;font-style:italic;display:flex;justify-content:space-between;align-items:flex-start;gap:5px;border-left:3px solid #ccc}
.cit-src{font-size:9px;font-style:normal;font-weight:600;opacity:.6;display:block;margin-top:1px}
.del-cit{background:none;border:none;color:#ccc;cursor:pointer;font-size:11px;flex-shrink:0;padding:0}
.del-cit:hover{color:#e74c3c}
.empty-hint{color:#ccc;font-size:12px;text-align:center;padding:28px 12px;line-height:1.8}
.edit-area{display:none;flex-direction:column;gap:7px;margin-top:10px;padding-top:10px;border-top:1px solid #eee}
.edit-area.open{display:flex}
.edit-area label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#aaa;font-weight:700;display:block;margin-bottom:1px}
.edit-area textarea,.edit-area input{width:100%;padding:6px 8px;border:1px solid #e0e0e0;border-radius:6px;font-family:inherit;font-size:11px;outline:none}
.edit-area textarea{min-height:55px;resize:vertical}
.edit-area textarea:focus,.edit-area input:focus{border-color:#888}
.cit-row{display:flex;gap:4px}
.cit-row input{flex:2}
.cit-row input.src-i{flex:1}
.btn-row{display:flex;gap:5px}
.btn-save,.btn-cancel,.btn-edit,.btn-place{flex:1;padding:6px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s}
.btn-save{background:#2c2c2a;color:white}.btn-save:hover{background:#444}
.btn-cancel{background:#f0ede8;color:#888}.btn-cancel:hover{background:#e0ddd8}
.btn-edit{background:#f0ede8;color:#2c2c2a;border:1px solid #ddd;margin-top:7px}.btn-edit:hover{background:#e0ddd8}
.btn-place{background:#1D9E75;color:white;margin-top:5px}.btn-place:hover{background:#178866}
.map-panel{padding:18px}
</style>
</head>
<body>

<h1>📚 Révision Bac Français</h1>
<p class="sub-header">Carte mentale · Dissertation</p>

<div class="tabs-bar" id="tabs-bar"></div>

<div class="layout">
  <div class="panel sidebar" id="diss-panel">
    <div class="panel-header">📄 Dissertation</div>
    <div class="panel-body" style="display:flex;flex-direction:column;gap:0">
      <div class="diss-config" id="diss-config"></div>
      <div class="diss-pages" id="diss-pages"></div>
      <div class="page-nav">
        <button class="nav-arrow" id="prev-btn" onclick="changePage(-1)">◀</button>
        <span class="page-indicator" id="page-indicator"></span>
        <button class="nav-arrow" id="next-btn" onclick="changePage(1)">▶</button>
      </div>
    </div>
  </div>

  <div class="panel map-panel">
    <div style="width:100%;overflow:auto">
      <svg id="mindmap" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

  <div class="panel sidebar" id="sidebar">
    <div class="panel-header">🔎 Détails</div>
    <div class="panel-body" id="sb-body"><div class="empty-hint">Clique sur une idée</div></div>
  </div>
</div>

<script>
/* ═══ DONNÉES ═══════════════════════════════════════════════════ */
const RIMBAUD_IDEAS = [
  {id:1,t:"La fuite d'un foyer d'une éducation stricte",cat:"liberté",dev:"Rimbaud fuit le foyer familial oppressant et l'éducation stricte imposée par sa mère. Cette fuite physique est aussi un acte fondateur de création poétique.",cits:[{t:"Je ne parlerai pas, je ne penserai rien.",src:"Sensation"},{t:"Et j'irai loin, bien loin, comme un bohémien, par la Nature.",src:"Sensation"}]},
  {id:2,t:"La nature comme refuge contre le foyer familial",cat:"nature",dev:"La nature devient un espace de liberté et d'évasion face à la pression familiale et bourgeoise.",cits:[{t:"Par les soirs bleus d'été, j'irai dans les sentiers.",src:"Sensation"},{t:"Et j'irai loin, bien loin, comme un bohémien, par la Nature.",src:"Sensation"}]},
  {id:3,t:"La nature, figure maternelle de substitution",cat:"nature",dev:"La nature remplace symboliquement la mère absente ou froide, offrant tendresse et plénitude.",cits:[{t:"Chair, Marbre, Fleur, Vénus, c'est en toi que je crois !",src:"Soleil et Chair"}]},
  {id:4,t:"La symbiose sensorielle entre le corps et le monde",cat:"sensualité",dev:"Le corps du poète fusionne avec le monde naturel dans une expérience sensorielle totale.",cits:[{t:"Je sais les choses, et va, les yeux fermés et les oreilles closes.",src:"Soleil et Chair"},{t:"Chair, Marbre, Fleur, Vénus, c'est en toi que je crois !",src:"Soleil et Chair"}]},
  {id:5,t:"La découverte de la sensualité et du désir",cat:"sensualité",dev:"L'adolescent Rimbaud découvre la sensualité féminine avec curiosité et candeur.",cits:[{t:"Elle était fort déshabillée.",src:"Première soirée"}]},
  {id:6,t:"Les émois amoureux de l'adolescence",cat:"adolescence",dev:"Rimbaud explore les premiers émois amoureux avec une légèreté ironique.",cits:[{t:"On n'est pas sérieux, quand on a dix-sept ans.",src:"Roman"},{t:"Elle était fort déshabillée.",src:"Première soirée"}]},
  {id:7,t:"Les auberges, espaces de liberté et de halte heureuse",cat:"liberté",dev:"Les auberges et chemins représentent l'espace idéal du vagabond : liberté et anonymat.",cits:[{t:"Par les soirs bleus d'été, j'irai dans les sentiers.",src:"Sensation"}]},
  {id:8,t:"La fuite et l'errance comme acte fondateur",cat:"liberté",dev:"L'errance n'est pas une fuite sans but mais un acte fondateur de la création poétique.",cits:[{t:"T'avaient parlé tout bas de l'âpre liberté.",src:"Ophélie"},{t:"Je ne parlerai pas, je ne penserai rien.",src:"Sensation"}]},

  {id:10,t:"La dénonciation de la guerre franco-prussienne",cat:"critique",dev:"Rimbaud témoigne de l'horreur de la guerre avec lucidité, loin des discours patriotiques.",cits:[{t:"Tandis que les crachats rouges de la mitraille.",src:"Le Mal"},{t:"Il a deux trous rouges au côté droit.",src:"Le Dormeur du Val"}]},
  {id:11,t:"L'anticléricalisme et la critique de la religion",cat:"critique",dev:"Rimbaud attaque violemment l'Église catholique, complice du pouvoir et de la guerre.",cits:[{t:"Tandis que les crachats rouges de la mitraille.",src:"Le Mal"}]},
  {id:12,t:"La satire de la bourgeoisie de province",cat:"critique",dev:"Charleville symbolise l'étroitesse d'esprit bourgeois que Rimbaud tourne en dérision.",cits:[{t:"Tous les bourgeois poussifs qu'étranglent les chaleurs.",src:"À la Musique"}]},
  {id:13,t:"La critique des codes et du conformisme bourgeois",cat:"critique",dev:"Face à l'ordre moral bourgeois, Rimbaud oppose son allure débraillée et sa liberté de pensée.",cits:[{t:"Tous les bourgeois poussifs qu'étranglent les chaleurs.",src:"À la Musique"},{t:"Moi, je suis, débraillé comme un étudiant.",src:"À la Musique"}]},

  {id:17,t:"L'ironie et l'autodérision du jeune poète",cat:"style",dev:"Rimbaud se moque de lui-même et du monde avec une ironie mordante.",cits:[{t:"Moi, je suis, débraillé comme un étudiant.",src:"À la Musique"},{t:"On n'est pas sérieux, quand on a dix-sept ans.",src:"Roman"}]},
  {id:18,t:"Le contraste et le diptyque comme arme satirique",cat:"style",dev:"Rimbaud construit des diptyques où la beauté attendue est violemment contredite par la réalité.",cits:[{t:"Belle hideusement d'un ulcère à l'anus.",src:"Vénus Anadyomène"},{t:"Il a deux trous rouges au côté droit.",src:"Le Dormeur du Val"}]},
  {id:19,t:"L'imitation des modèles comme étape nécessaire",cat:"style",dev:"Rimbaud s'approprie d'abord les formes classiques pour mieux les dépasser.",cits:[{t:"Ô pâle Ophélia ! belle comme la neige !",src:"Ophélie"}]},

const PREVOST_IDEAS = [
  {id:1,t:"Un roman fait pour plaire",cat:"roman",dev:"L'ouvrage vise avant tout le plaisir du lecteur par le romanesque et le suspens.",cits:[{t:"Les expressions ne rendent jamais qu'à demi les sentiments du cœur.",src:"Des Grieux, roman"}]},

let currentWork = 'rimbaud';
let currentPage = 0;
let detailsSelectedId = null;
let detailsEditOpen = false;
let selectedIdeaId = null;

/* ═══ ONGLETS ══════════════════════════════════════════════════ */
function renderTabs() {
  const bar = document.getElementById('tabs-bar');
  bar.innerHTML = '';
  Object.entries(WORKS).forEach(([key, work]) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (key === currentWork ? ' active' : '');
    btn.innerHTML = `<span class="tab-work-title">${work.title}</span><span class="tab-work-sub">${work.subtitle}</span>`;
    btn.onclick = () => { currentWork = key; currentPage = 0; detailsSelectedId = null; detailsEditOpen = false; selectedIdeaId = null; renderAll(); };
    bar.appendChild(btn);
  });
}

/* ═══ DISSERTATION ══════════════════════════════════════════════ */
function getDiss() {
  const work = WORKS[currentWork];
  if (!work.diss) {
    const saved = localStorage.getItem('diss_v2_' + currentWork);
    work.diss = saved ? JSON.parse(saved) : {
      parties:3, subParts:3, subEnabled:true,
      introSubj:'', probl:'', plan:'', conclu:'',
      parts:[
        {title:'',subs:[{ideaId:null},{ideaId:null},{ideaId:null}]},
        {title:'',subs:[{ideaId:null},{ideaId:null},{ideaId:null}]},
        {title:'',subs:[{ideaId:null},{ideaId:null},{ideaId:null}]}
      ]
    };
  }
  return work.diss;
}
function saveDiss() { localStorage.setItem('diss_v2_' + currentWork, JSON.stringify(getDiss())); }

function setParties(n) { getDiss().parties = n; renderDiss(); saveDiss(); }
function setSubParts(n) { getDiss().subParts = n; renderDiss(); saveDiss(); }
function toggleSubParts() { const d = getDiss(); d.subEnabled = !d.subEnabled; renderDiss(); saveDiss(); }
function totalPages() { return 1 + getDiss().parties + 1; }
function changePage(dir) { currentPage = Math.max(0, Math.min(totalPages()-1, currentPage+dir)); renderDiss(); }

function renderDiss() {
  const work = WORKS[currentWork];
  const diss = getDiss();
  const container = document.getElementById('diss-pages');
  container.innerHTML = '';
  if (currentPage >= totalPages()) currentPage = totalPages() - 1;

  // Config
  document.getElementById('diss-config').innerHTML = `
    <div class="config-row"><span class="config-label">Parties :</span><div class="config-btns">
      <button class="cfg-btn${diss.parties===2?' active':''}" onclick="setParties(2)">2</button>
      <button class="cfg-btn${diss.parties===3?' active':''}" onclick="setParties(3)">3</button>
    </div></div>
    <div class="config-row"><span class="config-label">Sous-parties :</span><div class="config-btns">
      <button class="cfg-btn${diss.subParts===2?' active':''}" onclick="setSubParts(2)">2</button>
      <button class="cfg-btn${diss.subParts===3?' active':''}" onclick="setSubParts(3)">3</button>
    </div>
    <button class="cfg-toggle${diss.subEnabled?' on':''}" onclick="toggleSubParts()">${diss.subEnabled?'ON':'OFF'}</button></div>`;

  // PAGE 0 : Intro
  const p0 = mkPage(0); container.appendChild(p0);
  const fb = div('free-section');
  fb.innerHTML = `<div class="free-label">📖 ${work.subtitle}</div><div class="intro-fixed-text">${work.intro}</div>`;
  p0.appendChild(fb);
  p0.appendChild(makeTA('✏️ Introduction du sujet', diss.introSubj, v => { diss.introSubj = v; saveDiss(); }, 'Introduire le sujet…'));
  p0.appendChild(makeTA('❓ Problématique', diss.probl, v => { diss.probl = v; saveDiss(); }, 'Formulation passive…', true));
  p0.appendChild(makeTA('🗂️ Annonce du plan', diss.plan, v => { diss.plan = v; saveDiss(); }, 'Nous verrons dans un premier temps…'));

  // PAGES PARTIES
  for (let pi = 0; pi < diss.parties; pi++) {
    const pp = mkPage(pi + 1); container.appendChild(pp);
    const part = diss.parts[pi];
    const sec = div('diss-section');
    const head = div('section-head');
    const num = span('section-num'); num.textContent = `Partie ${pi+1}`;
    const inp = document.createElement('input'); inp.className = 'section-title-input'; inp.placeholder = `Titre de la partie ${pi+1}…`; inp.value = part.title; inp.oninput = () => { part.title = inp.value; saveDiss(); };
    head.appendChild(num); head.appendChild(inp); sec.appendChild(head);

    if (diss.subEnabled) {
      const subs = div('sub-parts');
      for (let si = 0; si < diss.subParts; si++) {
        if (!part.subs[si]) part.subs[si] = {ideaId:null};
        const sub = part.subs[si];
        const sp = div('sub-part' + (sub.ideaId ? ' has-idea' : '') + (selectedIdeaId ? ' drop-target' : ''));
        const lbl = div('sub-part-label'); lbl.textContent = `Sous-partie ${si+1}`;
        const content = div('sub-part-content');

        if (sub.ideaId) {
          const idea = work.ideas.find(i => i.id === sub.ideaId);
          if (idea) {
            const color = work.catColors[idea.cat];
            sp.style.borderColor = color; sp.style.borderStyle = 'solid';
            const tt = div('sub-part-title'); tt.style.color = color; tt.textContent = idea.t; content.appendChild(tt);
            if (idea.cits && idea.cits.length) { const c = div('sub-part-cit'); c.textContent = `« ${idea.cits[0].t} »`; content.appendChild(c); }
            const rm = document.createElement('button'); rm.className = 'remove-idea'; rm.textContent = '✕';
            rm.onclick = e => { e.stopPropagation(); sub.ideaId = null; saveDiss(); renderDiss(); };
            sp.appendChild(rm);
          }
        } else {
          const h = div('sub-part-hint'); h.textContent = selectedIdeaId ? '👆 Cliquer pour placer ici' : '+ Sélectionner une idée';
          content.appendChild(h);
        }

        sp.onclick = () => {
          if (selectedIdeaId) { sub.ideaId = selectedIdeaId; selectedIdeaId = null; saveDiss(); draw(); renderDiss(); }
          else if (sub.ideaId) { detailsSelectedId = sub.ideaId; detailsEditOpen = false; renderDetails(); }
        };
        sp.appendChild(lbl); sp.appendChild(content); subs.appendChild(sp);
      }
      sec.appendChild(subs);
    }
    pp.appendChild(sec);
  }

  // PAGE CONCLUSION
  const pc = mkPage(diss.parties + 1); container.appendChild(pc);
  pc.appendChild(makeTA('✅ Conclusion', diss.conclu, v => { diss.conclu = v; saveDiss(); }, 'Bilan, synthèse, ouverture…'));

  document.querySelectorAll('.diss-page').forEach((p, i) => p.classList.toggle('active', i === currentPage));
  document.getElementById('page-indicator').textContent = `${currentPage+1} / ${totalPages()}`;
  document.getElementById('prev-btn').disabled = currentPage === 0;
  document.getElementById('next-btn').disabled = currentPage === totalPages() - 1;
}

function makeTA(label, val, cb, placeholder, isProb=false) {
  const d = div('free-section');
  const l = div('free-label'); l.textContent = label; d.appendChild(l);
  const ta = document.createElement('textarea');
  ta.className = 'free-textarea' + (isProb ? ' prob-textarea' : '');
  ta.placeholder = placeholder; ta.value = val || '';
  ta.oninput = () => cb(ta.value);
  d.appendChild(ta); return d;
}
function mkPage(idx) { const d = div('diss-page'); d.dataset.page = idx; return d; }
function div(cls) { const d = document.createElement('div'); d.className = cls; return d; }
function span(cls) { const s = document.createElement('span'); s.className = cls; return s; }

/* ═══ SVG DRAW ══════════════════════════════════════════════════ */
const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs, parent) {
  const e = document.createElementNS(NS, tag);
  for(const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  if(parent) parent.appendChild(e);
  return e;
}
function wrap(text, maxC) {
  const words = text.split(' '); const lines=[]; let line='';
  words.forEach(w => { const test=line?line+' '+w:w; if(test.length>maxC&&line){lines.push(line);line=w;}else line=test; });
  if(line) lines.push(line); return lines;
}
function svgT(parent, x, y, txt, attrs={}) {
  const t = el('text',{x,y,'text-anchor':'middle','dominant-baseline':'middle',...attrs},parent);
  t.textContent = txt; return t;
}

function draw() {
  const work = WORKS[currentWork];
  const svg = document.getElementById('mindmap');
  svg.innerHTML = '';

  if (!work.ideas || work.ideas.length === 0) {
    svg.setAttribute('width', 800); svg.setAttribute('height', 300);
    el('rect',{x:0,y:0,width:800,height:300,fill:'white'},svg);
    svgT(svg, 400, 150, '[ Contenu à venir ]', {fill:'#ccc','font-size':'18'});
    return;
  }

  const W=1060, IW=168, IH=40, CW=118, CH=38, G=30;
  const grouped={};
  work.ideas.forEach(i => { if(!grouped[i.cat]) grouped[i.cat]=[]; grouped[i.cat].push(i); });
  const cats = Object.keys(grouped);
  const left = cats.slice(0, Math.ceil(cats.length/2));
  const right = cats.slice(Math.ceil(cats.length/2));

  function calcCol(list) {
    let y=0; const pos={};
    list.forEach(ck => {
      const n=grouped[ck].length; const bh=Math.max(CH, n*(IH+7)-7);
      pos[ck]={blockTop:y+50,bh,catCY:y+bh/2+50}; y+=bh+26;
    });
    return {pos, totalH:y-26};
  }

  const pL=calcCol(left), pR=calcCol(right);
  const svgH = Math.max(pL.totalH, pR.totalH) + 100;
  svg.setAttribute('width',W); svg.setAttribute('height',svgH); svg.setAttribute('viewBox',`0 0 ${W} ${svgH}`);

  const cx=W/2, cy=svgH/2, rw=138, rh=56;
  const g0=el('g',{},svg);
  el('rect',{x:cx-rw/2,y:cy-rh/2,width:rw,height:rh,rx:28,fill:'#2c2c2a'},g0);
  svgT(g0,cx,cy-10,work.title,{fill:'white','font-size':'13','font-weight':'700'});
  svgT(g0,cx,cy+8,work.subtitle,{fill:'#ccc','font-size':'10'});

  const allPos={};
  left.forEach(ck => allPos[ck]={...pL.pos[ck],side:'left'});
  right.forEach(ck => allPos[ck]={...pR.pos[ck],side:'right'});

  cats.forEach(ck => {
    const p=allPos[ck]; const color=work.catColors[ck]; const label=work.catLabels[ck];
    const iL=p.side==='left';
    const catX=iL?cx-rw/2-G-CW:cx+rw/2+G;
    const catCX=catX+CW/2, catCY=p.catCY;
    const srcX=iL?cx-rw/2:cx+rw/2;
    const dstX=iL?catX+CW:catX;
    const midX=iL?srcX-45:srcX+45;

    el('path',{d:`M ${srcX} ${cy} C ${midX} ${cy}, ${midX} ${catCY}, ${dstX} ${catCY}`,stroke:color,'stroke-width':'2.5',fill:'none',opacity:'.6'},svg);
    const gc=el('g',{},svg);
    el('rect',{x:catX,y:catCY-CH/2,width:CW,height:CH,rx:19,fill:color},gc);
    const cl=wrap(label,12);
    cl.forEach((line,li)=>svgT(gc,catCX,catCY-(cl.length-1)*6+li*12,line,{fill:'white','font-size':'10','font-weight':'700'}));

    const ideaX=iL?catX-G-IW:catX+CW+G;
    const ideaCX=ideaX+IW/2;

    grouped[ck].forEach((idea,ii) => {
      const iy=p.blockTop+ii*(IH+7), iyCY=iy+IH/2;
      const fromX=iL?catX:catX+CW, toX=iL?ideaX+IW:ideaX;
      el('path',{d:`M ${fromX} ${catCY} C ${fromX+(iL?-24:24)} ${catCY}, ${toX+(iL?24:-24)} ${iyCY}, ${toX} ${iyCY}`,stroke:color,'stroke-width':'1.5',fill:'none',opacity:'.3'},svg);

      const isSel=detailsSelectedId===idea.id;
      const isPlacing=selectedIdeaId===idea.id;
      const gi=el('g',{style:'cursor:pointer'},svg);
      gi.addEventListener('click',()=>{ detailsSelectedId=idea.id; detailsEditOpen=false; draw(); renderDetails(); });

      const fill=isPlacing?color:isSel?color+'25':'white';
      const sw=isSel||isPlacing?'2.5':'1.5';
      el('rect',{x:ideaX,y:iy,width:IW,height:IH,rx:7,fill,stroke:color,'stroke-width':sw},gi);

      const hasC=idea.dev||idea.cits&&idea.cits.length;
      if(hasC&&!isSel&&!isPlacing) el('circle',{cx:ideaX+IW-8,cy:iy+8,r:3.5,fill:color},gi);

      const il=wrap(idea.t,20);
      const tcolor=isPlacing?'white':'#2c2c2a';
      il.slice(0,2).forEach((line,li)=>{
        const tL=Math.min(il.length,2);
        svgT(gi,ideaCX,iyCY-(tL-1)*6+li*12,(li===1&&il.length>2)?line+'…':line,
          {fill:tcolor,'font-size':'10','font-weight':isSel||isPlacing?'600':'400'});
      });
    });
  });
}

/* ═══ DETAILS ══════════════════════════════════════════════════ */
function renderDetails() {
  const work = WORKS[currentWork];
  const body = document.getElementById('sb-body');
  if (!detailsSelectedId) { body.innerHTML='<div class="empty-hint">Clique sur une idée</div>'; return; }
  const idea = work.ideas.find(i=>i.id===detailsSelectedId);
  if (!idea) return;
  const color = work.catColors[idea.cat];
  let html = `<span class="cat-badge" style="background:${color}">${work.catLabels[idea.cat]}</span>`;
  html += `<div class="idea-title-sb">${idea.t}</div>`;

  if (!detailsEditOpen) {
    if (idea.dev) html += `<div class="sec-lbl">Développement</div><div class="dev-box">${idea.dev.replace(/\n/g,'<br>')}</div>`;
    if (idea.cits&&idea.cits.length) {
      html += `<div class="sec-lbl">Citations (${idea.cits.length})</div>`;
      idea.cits.forEach((c,i)=>{
        html+=`<div class="cit-item" style="border-left-color:${color}"><span>« ${c.t} »<span class="cit-src">— ${c.src}</span></span><button class="del-cit" onclick="delCit(${idea.id},${i})">✕</button></div>`;
      });
    }
    html += `<button class="btn-edit" onclick="openEdit()">✎ Modifier</button>`;
    html += `<button class="btn-place" onclick="startPlace(${idea.id})">📌 Placer dans la dissertation</button>`;
  } else {
    if(idea.cits&&idea.cits.length){
      html+=`<div class="sec-lbl">Citations</div>`;
      idea.cits.forEach((c,i)=>{ html+=`<div class="cit-item" style="border-left-color:${color}"><span>« ${c.t} » — ${c.src}</span><button class="del-cit" onclick="delCit(${idea.id},${i})">✕</button></div>`; });
    }
    html+=`<div class="edit-area open"><div><label>Développement</label><textarea id="e-dev" placeholder="…">${idea.dev||''}</textarea></div><div><label>Citation + source</label><div class="cit-row"><input id="e-cit" type="text" placeholder="Citation…"><input id="e-src" type="text" class="src-i" placeholder="Source"></div></div><div class="btn-row"><button class="btn-save" onclick="saveEdit()">✓ Enregistrer</button><button class="btn-cancel" onclick="cancelEdit()">Annuler</button></div></div>`;
  }
  body.innerHTML = html;
}

function openEdit(){detailsEditOpen=true;renderDetails();}
function cancelEdit(){detailsEditOpen=false;renderDetails();}
function saveEdit(){
  const idea=WORKS[currentWork].ideas.find(i=>i.id===detailsSelectedId);
  idea.dev=document.getElementById('e-dev').value.trim();
  const cv=document.getElementById('e-cit').value.trim();
  const sv=document.getElementById('e-src').value.trim();
  if(cv)idea.cits.push({t:cv,src:sv||'—'});
  detailsEditOpen=false; draw(); renderDetails();
}
function delCit(id,idx){
  const idea=WORKS[currentWork].ideas.find(i=>i.id===id);
  idea.cits.splice(idx,1); draw(); renderDetails();
}
function startPlace(id){
  selectedIdeaId=id;
  if(currentPage===0||currentPage===getDiss().parties+1)currentPage=1;
  draw(); renderDiss();
}

function renderAll() { renderTabs(); draw(); renderDiss(); renderDetails(); }

renderAll();
</script>
